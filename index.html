<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Open Brain</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    padding-top: env(safe-area-inset-top, 1.5rem);
  }
  h1 {
    font-size: 1.25rem;
    font-weight: 600;
    color: #999;
    margin-bottom: 1rem;
    letter-spacing: 0.02em;
  }
  textarea {
    width: 100%;
    flex: 1;
    min-height: 40dvh;
    background: #141414;
    color: #e0e0e0;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 1rem;
    font-size: 1rem;
    font-family: inherit;
    line-height: 1.5;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #4a9eff; }
  textarea::placeholder { color: #555; }
  button {
    width: 100%;
    padding: 1rem;
    margin-top: 1rem;
    background: #4a9eff;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.98); }
  button:disabled { background: #333; color: #666; transform: none; }
  .status {
    text-align: center;
    margin-top: 0.75rem;
    font-size: 0.9rem;
    min-height: 1.4rem;
    transition: color 0.3s;
  }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
</style>
</head>
<body>

<h1>Open Brain</h1>
<textarea id="thought" placeholder="What's on your mind?" autofocus></textarea>
<button id="send" onclick="capture()">Capture</button>
<div id="status" class="status"></div>

<script>
const SUPABASE_URL = 'https://tldynjvxbtjxjhqotvej.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsZHluanZ4YnRqeGpocW90dmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTMyMjAsImV4cCI6MjA5MDkyOTIyMH0.C4Q1OTr37Y7zDIVSG7ZTFLdroLETRriV5INIaZhIZwY';

async function capture() {
  const el = document.getElementById('thought');
  const btn = document.getElementById('send');
  const status = document.getElementById('status');
  const content = el.value.trim();

  if (!content) { el.focus(); return; }

  btn.disabled = true;
  status.className = 'status';
  status.textContent = 'Sending...';

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/inbox`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ content, source: 'mobile' })
    });

    if (res.ok) {
      status.className = 'status ok';
      status.textContent = 'Captured.';
      el.value = '';
      el.focus();
    } else {
      const msg = await res.text();
      throw new Error(msg);
    }
  } catch (e) {
    status.className = 'status err';
    status.textContent = 'Failed: ' + e.message;
  }

  btn.disabled = false;
}

// Submit on Cmd/Ctrl+Enter
document.getElementById('thought').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) capture();
});
</script>

</body>
</html>
